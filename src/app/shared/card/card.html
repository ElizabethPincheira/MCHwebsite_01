<div
class="
bg-[#F7F1EB]
rounded-3xl
shadow-lg
hover:shadow-2xl
transition
duration-300
p-8
text-center
flex
flex-col
items-center">

    <img
    [src]="product.image"
    [alt]="product.name"
    class="
    w-44
    h-44
    object-contain
    mb-6">

    <h3
    class="
    text-[#4A2C1D]
    font-bold
    text-2xl">

        {{product.name}}

    </h3>

    <p
    class="
    text-[#6D5A4F]
    mt-4
    leading-7">

        {{product.description}}

    </p>

    <span
    class="
    text-[#C96B3B]
    text-3xl
    font-bold
    mt-6">

        ${{product.price}}

    </span>

    

</div>
