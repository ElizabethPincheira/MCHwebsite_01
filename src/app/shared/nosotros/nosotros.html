<section
id="nosotros"
class="bg-[#FDF8F3] py-24">

    <div class="max-w-7xl mx-auto px-6">

        <!-- Título -->

        <div class="text-center mb-16">

            <h2
            class="
            text-[#4A2C1D]
            text-5xl
            font-extrabold">

                ¿POR QUÉ ELEGIRNOS?

            </h2>

            <div
            class="
            flex
            justify-center
            items-center
            gap-4
            mt-5">

                <div class="w-20 h-[2px] bg-[#C96B3B]"></div>

                <span class="text-[#C96B3B]">
                    ❤
                </span>

                <div class="w-20 h-[2px] bg-[#C96B3B]"></div>

            </div>

        </div>

        <!-- Contenido -->

        <div
        class="
        grid
        lg:grid-cols-3
        gap-12
        items-center">

            <!-- Imagen -->

            <div>

                <img
                src="assets/mote-bowl.png"
                alt="Mote con huesillos"
                class="
                rounded-3xl
                shadow-xl
                w-full">

            </div>

            <!-- Beneficios -->

            <div class="space-y-8">

                @for(benefit of benefits; track benefit.title){

                    <div
                    class="
                    flex
                    gap-5
                    items-start">

                        <div
                        class="
                        w-14
                        h-14
                        rounded-full
                        bg-[#556B2F]
                        text-white
                        flex
                        items-center
                        justify-center
                        text-2xl
                        shrink-0">

                            {{benefit.icon}}

                        </div>

                        <div>

                            <h3
                            class="
                            text-[#4A2C1D]
                            font-bold
                            text-xl">

                                {{benefit.title}}

                            </h3>

                            <p
                            class="
                            text-[#6D5A4F]
                            mt-2
                            leading-7">

                                {{benefit.description}}

                            </p>

                        </div>

                    </div>

                }

            </div>

            <!-- Sello -->

            <div
            class="
            flex
            justify-center">

                <div
                class="
                bg-[#FAF0E6]
                border-2
                border-[#E6CDB7]
                rounded-[40px]
                p-10
                text-center
                shadow-md
                max-w-xs">

                    <div
                    class="
                    text-[#C96B3B]
                    text-5xl
                    mb-6">

                        ✨

                    </div>

                    <h3
                    class="
                    text-[#4A2C1D]
                    text-3xl
                    font-bold
                    leading-relaxed">

                        HECHO
                        <br>
                        EN CASA

                    </h3>

                    <p
                    class="
                    mt-4
                    text-[#6D5A4F]">

                        Sabor tradicional,
                        preparación artesanal
                        y dedicación en cada vaso.

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>
