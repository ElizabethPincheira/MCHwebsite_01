<section

    <div class="max-w-7xl mx-auto px-6">

        <!-- Título -->

        <div class="text-center mb-16">

            </div>

            <!-- Instagram -->

            <div
            class="

            rounded-3xl
            shadow-md

            text-center">

                <div class="text-5xl mb-5">
                    📷
                </div>

                <h3
                class="
                text-[#4A2C1D]
                font-bold

                    Instagram

                </h3>

                text-[#6D5A4F]

                    @tucuenta

                </p>

            </div>

            <!-- Ubicación -->

            <div

                class="
                text-[#4A2C1D]

        mt-16">

            <a

            href="https://wa.me/569XXXXXXXX"
            target="_blank"

            text-white
            px-10
            py-4
            rounded-full
            font-semibold
            shadow-lg
