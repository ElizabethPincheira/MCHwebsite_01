<section id="hero" class="bg-[#FAF5EF] min-h-screen flex items-center">

    <div class="max-w-7xl mx-auto px-6 lg:px-12 py-20">

        <div class="grid lg:grid-cols-2 gap-14 items-center">

            <!-- TEXTO -->

            <div>

                <h1 class="
                text-[#4A2C1D]
                font-extrabold
                text-5xl
                lg:text-7xl
                leading-tight">

                    MOTE CON HUESILLOS

                </h1>

                <h2 class="
                text-[#C96B3B]
                text-3xl
                lg:text-5xl
                italic
                mt-3">

                    como hecho en casa

                </h2>

                <p class="
                text-[#5c4b42]
                text-lg
                leading-8
                mt-8
                max-w-xl">

                    Disfruta nuestro mote con huesillos,
                    elaborado con ingredientes naturales
                    y todo el sabor tradicional.

                </p>

                <!-- FEATURES -->

                <div class="flex gap-10 mt-10">

                    <div>

                        <h3 class="
                        text-[#4A2C1D]
                        font-bold">

                            100% NATURAL

                        </h3>

                        <p class="text-[#6d5a4f] mt-2">

                            Sin preservantes
                            ni colorantes.

                        </p>

                    </div>

                    <div>

                        <h3 class="
                        text-[#4A2C1D]
                        font-bold">

                            HECHO CON AMOR

                        </h3>

                        <p class="text-[#6d5a4f] mt-2">

                            Recetas caseras
                            de verdad.

                        </p>

                    </div>

                </div>

                <!-- BOTÓN -->

                <button (click)="orderNow()" class="
                mt-12
                bg-[#556B2F]
                hover:bg-[#475925]
                text-white
                px-8
                py-4
                rounded-full
                font-semibold
                shadow-lg
                transition">

                    Pedir ahora por WhatsApp

                </button>


            </div>

            <!-- IMAGEN -->

            <div class="
            flex
            justify-center
            relative">

                <img src="assets/mote-hero.png" alt="Mote con huesillos" class="
                w-full
                max-w-[550px]
                object-cover
                drop-shadow-2xl
                rounded-3xl">

            </div>

        </div>

    </div>

</section>
